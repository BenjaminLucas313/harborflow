version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: harborflow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: harborflow
      POSTGRES_PASSWORD: harborflow
      POSTGRES_DB: harborflow_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harborflow -d harborflow_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
